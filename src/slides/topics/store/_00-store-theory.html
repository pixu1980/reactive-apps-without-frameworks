<section data-topic="store" data-menu-title="Store theory">
  <h4 balance>What a Store <mark>actually is</mark>?</h4>
  <small balance>
    A store is <mark>a shared state tree</mark> plus a <mark>notification contract</mark>. It gives the app a single source of <mark>truth</mark> for <mark>data</mark> and a predictable way to tell
    the rest of the application when <mark>data changes</mark>.
  </small>
</section>
