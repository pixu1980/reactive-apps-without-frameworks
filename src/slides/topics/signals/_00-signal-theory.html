<section data-topic="signals" data-menu-title="Signal theory">
  <h4 balance>What a Signal <mark>actually is</mark>?</h4>
  <small balance>
    A signal is a <mark>reactive value wrapper</mark>. It gives the runtime <mark>one place to read</mark> and <mark>one stable way to know who must react later</mark> when that value changes.
  </small>
</section>
